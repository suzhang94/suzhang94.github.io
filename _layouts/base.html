<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:image" content="{{ site.url }}{{ site.author.photo }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #555;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --border: #e5e7eb;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .container { display: flex; align-items: center; justify-content: space-between; }
    nav a.brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
    }
    nav .links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-left: 24px;
      transition: color 0.2s;
    }
    nav .links a:hover { color: var(--accent); }

    /* Hero / Profile */
    .hero {
      display: flex;
      align-items: flex-start;
      gap: 40px;
      padding: 48px 0 32px;
    }
    .hero-photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 20%;
      flex-shrink: 0;
      border: 3px solid var(--border);
    }
    .hero-info h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .hero-info .tagline {
      font-size: 1.05rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .hero-info .tagline a { color: var(--accent); text-decoration: none; }
    .hero-info .tagline a:hover { text-decoration: underline; }
    .hero-info .bio {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .hero-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .hero-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--surface);
      transition: all 0.2s;
    }
    .hero-links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }
    .hero-links a svg { width: 14px; height: 14px; }

    /* Sections */
    .section {
      padding: 32px 0;
      border-top: 1px solid var(--border);
    }
    .section h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    /* Experience cards */
    .exp-card {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .exp-date {
      flex-shrink: 0;
      width: 100px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      padding-top: 2px;
    }
    .exp-content { flex: 1; }
    .exp-content h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .exp-content .company {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .exp-content ul {
      list-style: none;
      padding: 0;
    }
    .exp-content li {
      font-size: 0.88rem;
      color: var(--text-secondary);
      padding-left: 16px;
      position: relative;
      margin-bottom: 4px;
      line-height: 1.5;
    }
    .exp-content li::before {
      content: "–";
      position: absolute;
      left: 0;
      color: #ccc;
    }

    /* Publications */
    .pub {
      margin-bottom: 16px;
      padding-left: 16px;
      border-left: 2px solid var(--border);
    }
    .pub .pub-title {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .pub .pub-authors {
      font-size: 0.84rem;
      color: var(--text-secondary);
    }
    .pub .pub-venue {
      font-size: 0.84rem;
      color: var(--text-secondary);
      font-style: italic;
    }
    .pub .pub-links { margin-top: 4px; }
    .pub .pub-links a {
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      margin-right: 12px;
      font-weight: 500;
    }
    .pub .pub-links a:hover { text-decoration: underline; }

    /* Skills */
    .skills-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 16px;
      font-size: 0.88rem;
    }
    .skills-grid .label {
      font-weight: 600;
      color: var(--text);
    }
    .skills-grid .value {
      color: var(--text-secondary);
    }

    /* Research */
    .research-item { margin-bottom: 16px; }
    .research-item h3 {
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .research-item .dates {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .research-item p {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Service */
    .service { font-size: 0.88rem; color: var(--text-secondary); }

    /* Page content (non-home pages) */
    .page-content { padding: 24px 0; }

    /* Footer */
    footer {
      padding: 32px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
      color: #999;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .hero { flex-direction: column; align-items: center; text-align: center; gap: 20px; padding: 32px 0 24px; }
      .hero-links { justify-content: center; }
      .exp-card { flex-direction: column; gap: 4px; }
      .exp-date { width: auto; }
      .skills-grid { grid-template-columns: 1fr; }
      .skills-grid .label { margin-top: 8px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a class="brand" href="/">Home</a>
      <div class="links">
        <a href="/works/">Recent Works</a>
      </div>
    </div>
  </nav>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      &copy; 2025 Su Zhang
    </div>
  </footer>
</body>
</html>
